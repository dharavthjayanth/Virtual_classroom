<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Virtual Classroom</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif;}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:200;
  background:rgba(13,17,23,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
.live-pill{display:flex;align-items:center;gap:5px;background:#0a1f0f;border:1px solid #1a6b2a;border-radius:20px;padding:3px 11px;flex-shrink:0;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:ldot 2s infinite;}
@keyframes ldot{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.06)}}
.live-txt{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#22c55e;}
.tb-subject{font-size:14px;font-weight:600;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-timer{font-family:'Courier New',monospace;font-size:20px;font-weight:700;color:#f1f5f9;letter-spacing:2px;}
.tb-mood{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;font-size:12px;color:#94a3b8;cursor:pointer;}
.tb-count{display:flex;align-items:center;gap:6px;font-size:13px;color:#94a3b8;}
.btn-end{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.2px;}
.btn-end:disabled{background:#7f1d1d;}

/* ── MAIN LAYOUT ── */
.main-layout{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  display:grid;
  grid-template-columns:180px 1fr 320px;
}

/* ── LEFT: Slides panel ── */
.slides-panel{
  background:#111820;border-right:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
}
.sp-head{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1px;padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,.05);}
.sp-slides-list{flex:1;overflow-y:auto;padding:8px;}
.sp-slides-list::-webkit-scrollbar{width:3px;}
.sp-slides-list::-webkit-scrollbar-thumb{background:#1e3050;}
.slide-thumb{
  border-radius:6px;border:2px solid transparent;margin-bottom:6px;
  cursor:pointer;overflow:hidden;background:#1a2535;
  transition:border-color .2s;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#475569;text-align:center;padding:6px;
}
.slide-thumb.active{border-color:#3b82f6;}
.slide-thumb img{width:100%;height:100%;object-fit:cover;}
.sp-no-slide{padding:14px;font-size:11px;color:#334155;text-align:center;line-height:1.6;}
.sp-upload-btn{
  margin:8px;padding:8px;background:#1e3050;color:#93c5fd;
  border:1px dashed #2d4a6a;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;text-align:center;
  transition:background .2s;
}
.sp-upload-btn:hover{background:#2d4a6a;}
.sp-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-top:1px solid rgba(255,255,255,.05);}
.sp-nav-btn{background:#1a2535;border:1px solid rgba(255,255,255,.08);color:#64748b;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;}
.sp-nav-btn:hover{background:#2563eb;color:#fff;border-color:#2563eb;}
.sp-slide-num{font-size:11px;color:#475569;}

/* ── CENTER: 3D classroom ── */
.classroom-wrap{position:relative;overflow:hidden;}
#threeCanvas{width:100%;height:100%;display:block;}

/* CSS2D labels */
.stu-label-wrap{pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:3px;}
.stu-name-tag{
  font-size:11px;font-weight:700;color:#fff;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  border-radius:5px;padding:2px 8px;white-space:nowrap;
  font-family:'Segoe UI',sans-serif;
}
.stu-emo{font-size:16px;animation:efloat 2.5s ease-in-out infinite;}
@keyframes efloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.stu-bubble{
  background:rgba(255,255,255,.95);color:#0d1117;
  border-radius:10px 10px 10px 3px;
  padding:5px 10px;font-size:11px;font-weight:500;
  max-width:150px;text-align:center;line-height:1.4;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  font-family:'Segoe UI',sans-serif;
  animation:bpop .25s ease;
  white-space:normal;word-break:break-word;
}
@keyframes bpop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.stu-bubble.hidden{display:none;}
.absent-overlay{
  font-size:10px;color:#ef4444;
  background:rgba(0,0,0,.7);border:1px solid #7f1d1d;
  border-radius:4px;padding:2px 7px;
  font-family:'Segoe UI',sans-serif;
}

/* Score flash */
.score-flash{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  z-index:300;background:rgba(13,17,23,.96);
  border-radius:10px;padding:7px 16px;
  font-size:13px;font-weight:700;
  border:1px solid;pointer-events:none;
  animation:sfIn .3s ease;
  white-space:nowrap;
}
@keyframes sfIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── RIGHT: Chat + webcam ── */
.right-panel{
  background:#111820;border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Participants */
.rp-section{border-bottom:1px solid rgba(255,255,255,.06);}
.rp-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:12px;font-weight:700;color:#94a3b8;}
.rp-head span{color:#f1f5f9;}
.participants-list{padding:0 12px 10px;display:flex;flex-direction:column;gap:5px;}
.part-row{display:flex;align-items:center;gap:8px;}
.part-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.part-info{flex:1;}
.part-name{font-size:12px;font-weight:600;color:#e2e8f0;}
.part-role{font-size:10px;color:#475569;}
.part-emo{font-size:14px;flex-shrink:0;}

/* Chat */
.chat-section{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:12px;font-weight:700;color:#f1f5f9;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.chat-feed{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.chat-feed::-webkit-scrollbar{width:3px;}
.chat-feed::-webkit-scrollbar-thumb{background:#1e3050;border-radius:2px;}
.chat-msg{display:flex;gap:7px;animation:cmIn .2s ease;}
@keyframes cmIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.cm-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:#1a2535;}
.cm-body{flex:1;}
.cm-who{font-size:10px;font-weight:700;margin-bottom:3px;}
.cm-who.you{color:#3b82f6;}
.cm-who.rohit{color:#f87171;}.cm-who.priya{color:#c084fc;}.cm-who.arjun{color:#60a5fa;}
.cm-who.sneha{color:#f472b6;}.cm-who.vikram{color:#fb923c;}
.cm-bubble-you{
  background:#2563eb;color:#fff;border-radius:10px 10px 3px 10px;
  padding:7px 10px;font-size:12px;line-height:1.5;max-width:200px;
  align-self:flex-end;
}
.cm-bubble-stu{
  background:#1e2d45;color:#cbd5e1;border-radius:10px 10px 10px 3px;
  padding:7px 10px;font-size:12px;line-height:1.5;
}
.cm-time{font-size:9px;color:#334155;margin-top:2px;}
.sit-note-chat{
  font-size:11px;color:#fca5a5;
  background:rgba(220,38,38,.08);border-left:2px solid #dc2626;
  padding:6px 9px;border-radius:0 6px 6px 0;
  margin:2px 0;
}

/* Webcam + input */
.bottom-section{border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.webcam-row{padding:10px 12px 6px;display:flex;gap:8px;align-items:center;}
.webcam-box{width:72px;height:54px;border-radius:6px;overflow:hidden;border:2px solid #3b82f6;background:#000;position:relative;flex-shrink:0;}
#webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-off-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:#040d1a;}
.mic-rec-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.webcam-info{flex:1;}
.wc-name{font-size:12px;font-weight:700;color:#f1f5f9;}
.wc-role{font-size:10px;color:#475569;}
.wc-stats{display:flex;gap:10px;margin-top:4px;}
.wc-stat{text-align:center;}
.wc-sv{font-size:13px;font-weight:800;color:#e2e8f0;}
.wc-sl{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:.5px;}

/* Input */
.input-area{padding:8px 12px 10px;}
.input-row{display:flex;gap:7px;align-items:center;background:#1a2535;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:6px 8px;}
#teachInput{
  flex:1;background:transparent;border:none;outline:none;
  font-size:13px;color:#e2e8f0;font-family:inherit;
  resize:none;height:34px;line-height:1.4;
}
#teachInput::placeholder{color:#334155;}
.btn-mic-sm{
  width:32px;height:32px;border-radius:50%;
  border:none;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;
  transition:all .2s;user-select:none;-webkit-user-select:none;
}
.btn-mic-sm.listening{background:#dc2626;animation:mpulse 1s infinite;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 3px rgba(220,38,38,.2)}50%{box-shadow:0 0 0 7px rgba(220,38,38,.05)}}
.btn-send{
  width:34px;height:34px;border-radius:50%;
  border:none;background:#2563eb;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;
  transition:background .2s;
}
.btn-send:hover{background:#1d4ed8;}
.btn-send:disabled{background:#1e3050;cursor:not-allowed;}

/* Bottom toolbar */
.toolbar{
  position:fixed;bottom:0;left:180px;right:320px;
  height:52px;background:rgba(13,17,23,.96);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;gap:8px;
  z-index:150;
}
.tool-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 14px;border-radius:8px;cursor:pointer;
  border:none;background:transparent;color:#94a3b8;
  transition:all .2s;font-family:inherit;
}
.tool-btn:hover{background:rgba(255,255,255,.06);color:#f1f5f9;}
.tool-btn.active{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);}
.tool-btn-icon{font-size:18px;}
.tool-btn-label{font-size:9px;font-weight:600;letter-spacing:.3px;}
.tool-sep{width:1px;height:28px;background:rgba(255,255,255,.08);}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="live-pill"><div class="live-dot"></div><span class="live-txt">LIVE</span></div>
  <span class="tb-subject" id="tbSubject">Loading…</span>
  <div class="tb-timer" id="tbTimer">00:00</div>
  <div class="tb-mood" id="tbMood">😊 Positive Atmosphere</div>
  <div class="tb-count">👥 <span id="tbCount">5</span></div>
  <button class="btn-end" id="btnEnd">End Session</button>
</header>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- LEFT: Slides -->
  <aside class="slides-panel">
    <div class="sp-head">Slides <span id="spSlideNum" style="color:#64748b;font-weight:400;"></span></div>
    <div class="sp-slides-list" id="spSlidesList">
      <div class="sp-no-slide" id="spNoSlide">No slides uploaded</div>
    </div>
    <div class="sp-upload-btn" id="spUploadBtn" onclick="document.getElementById('slideFileInput').click()">
      📁 Upload PPT / PDF
    </div>
    <input type="file" id="slideFileInput" accept=".pdf,.ppt,.pptx" style="display:none"/>
    <div class="sp-nav">
      <button class="sp-nav-btn" id="btnPrev">←</button>
      <span class="sp-slide-num" id="spSlideNumNav">1 / 1</span>
      <button class="sp-nav-btn" id="btnNext">→</button>
    </div>
  </aside>

  <!-- CENTER: 3D Classroom -->
  <div class="classroom-wrap">
    <canvas id="threeCanvas"></canvas>
  </div>

  <!-- RIGHT: Participants + Chat -->
  <aside class="right-panel">
    <div class="rp-section">
      <div class="rp-head">Participants (<span id="rpCount">6</span>) <span style="font-size:11px;cursor:pointer;">✕</span></div>
      <div class="participants-list" id="partList">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="chat-section">
      <div class="chat-head">Class Chat <span style="font-size:11px;cursor:pointer;color:#475569;">✕</span></div>
      <div class="chat-feed" id="chatFeed">
        <div style="font-size:11px;color:#334155;text-align:center;padding:12px 0;">
          Start teaching — say "Good morning everyone!"
        </div>
      </div>
    </div>
    <div class="bottom-section">
      <div class="webcam-row">
        <div class="webcam-box">
          <video id="webcam" autoplay muted playsinline></video>
          <div class="cam-off-msg hidden" id="camOff">🎥</div>
          <div class="mic-rec-dot hidden" id="micRecDot"></div>
        </div>
        <div class="webcam-info">
          <div class="wc-name">You (Instructor)</div>
          <div class="wc-role">Teaching now</div>
          <div class="wc-stats">
            <div class="wc-stat"><div class="wc-sv" id="wsPresent">5</div><div class="wc-sl">Active</div></div>
            <div class="wc-stat"><div class="wc-sv" id="wsExchanges">0</div><div class="wc-sl">Chats</div></div>
            <div class="wc-stat"><div class="wc-sv" id="wsAvg" style="color:#22c55e">–</div><div class="wc-sl">Score</div></div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="teachInput" placeholder="Ask a question or say something…" rows="1"></textarea>
          <button class="btn-mic-sm" id="btnMic">🎙</button>
          <button class="btn-send" id="btnSend">➤</button>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- BOTTOM TOOLBAR -->
<div class="toolbar">
  <button class="tool-btn active" id="tbMicBtn"><span class="tool-btn-icon">🎙</span><span class="tool-btn-label">Mic</span></button>
  <button class="tool-btn" id="tbCamBtn"><span class="tool-btn-icon">📷</span><span class="tool-btn-label">Camera</span></button>
  <div class="tool-sep"></div>
  <button class="tool-btn"><span class="tool-btn-icon">🖥</span><span class="tool-btn-label">Screen Share</span></button>
  <button class="tool-btn" id="tbRaiseBtn"><span class="tool-btn-icon">✋</span><span class="tool-btn-label">Raise Hand</span></button>
  <button class="tool-btn"><span class="tool-btn-icon">😊</span><span class="tool-btn-label">Reactions</span></button>
  <div class="tool-sep"></div>
  <button class="tool-btn"><span class="tool-btn-icon">⏱</span><span class="tool-btn-label">Timer</span></button>
  <button class="tool-btn"><span class="tool-btn-icon">📝</span><span class="tool-btn-label">Notes</span></button>
</div>

<!-- THREE.JS -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── App state ─────────────────────────────────────────────────────────────
let config = {}, agents = [], elapsed = 0, maxSecs = 1800;
let timerH, sessionEnded = false, isListening = false, recognition = null;
let exchangeCount = 0, scores = [], slideIndex = 1, totalSlides = 1;

const EMO = {
  bored:'😑', focused:'🎯', confused:'😕', distracted:'😶',
  angry:'😠', excited:'🤩', anxious:'😰', skeptical:'🤨',
  engaged:'✨', sleepy:'😴', amused:'😄', surprised:'😲', happy:'😊'
};
const AGENT_COLORS = {
  rohit:'#f87171', priya:'#c084fc', arjun:'#60a5fa', sneha:'#f472b6', vikram:'#fb923c'
};
const AGENT_EMOJI = { rohit:'🧑', priya:'👩', arjun:'🧑', sneha:'👩', vikram:'🧑' };

// Shirt / trouser colors
const SHIRTS  = { rohit:0x1e3a5f, priya:0x6b1a8a, arjun:0x1a4a1a, sneha:0x8a1a4a, vikram:0x4a3a0a };
const TROUSER = { rohit:0x1a1a2e, priya:0x1a1a2e, arjun:0x1e2a1a, sneha:0x1a1a2e, vikram:0x1a2a1a };
const SKIN    = 0xc68642;
const HAIR    = 0x0d0705;

// Seat positions (from teacher POV — students seen from behind)
// Row 1 (front, closest to teacher): 3 seats
// Row 2 (back): 2 seats — centered
const SEATS = [
  { id:'rohit',  x:-3.5, z:1.5,  ry:0.06 },
  { id:'sneha',  x:-1.1, z:-0.5, ry:0.02 },
  { id:'vikram', x: 1.1, z:-0.5, ry:-0.02 },
  { id:'priya',  x: 3.5, z:1.5,  ry:-0.06 },
  { id:'arjun',  x: 0.0, z:2.8,  ry:0.0 },
];

// ── Three.js setup ────────────────────────────────────────────────────────
const canvas   = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace  = THREE.SRGBColorSpace;

const labelRenderer = new CSS2DRenderer();
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible;';
document.querySelector('.classroom-wrap').appendChild(labelRenderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1f2e);
scene.fog = new THREE.FogExp2(0x1a1f2e, 0.025);

// Teacher POV camera — looking at students from the front
const camera = new THREE.PerspectiveCamera(58, 1, 0.1, 60);
camera.position.set(0, 3.2, 9.0);
camera.lookAt(0, 1.5, -1.5);

function resizeRenderer() {
  const el = canvas.parentElement;
  const w  = el.clientWidth, h = el.clientHeight;
  renderer.setSize(w, h, false);
  labelRenderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
const ro = new ResizeObserver(resizeRenderer);
ro.observe(canvas.parentElement);
resizeRenderer();

// ── Lighting ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffeedd, 0.55));

// Main directional (simulates ceiling lights)
const sun = new THREE.DirectionalLight(0xfff5e8, 1.0);
sun.position.set(0, 8, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 30;
sun.shadow.camera.left = -12; sun.shadow.camera.right = 12;
sun.shadow.camera.top  = 8;   sun.shadow.camera.bottom = -8;
sun.shadow.bias = -0.001;
scene.add(sun);

// Ceiling panel lights
const panelPos = [[-4,5.5,0],[0,5.5,0],[4,5.5,0],[-4,5.5,-4],[0,5.5,-4],[4,5.5,-4]];
panelPos.forEach(([x,y,z]) => {
  const pl = new THREE.PointLight(0xfff9f0, 0.5, 9);
  pl.position.set(x,y,z); scene.add(pl);
  // White panel quad
  const pm = new THREE.Mesh(new THREE.PlaneGeometry(1.4,0.8), new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide}));
  pm.rotation.x = Math.PI/2; pm.position.set(x,5.49,z); scene.add(pm);
});

// Window light from right
const wl = new THREE.DirectionalLight(0xb8d4ff, 0.5);
wl.position.set(10,5,0); scene.add(wl);

// ── Helper: simple box ────────────────────────────────────────────────────
function mkBox(w,h,d,col,x,y,z,cast=false,recv=true){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:col})
  );
  m.position.set(x,y,z);
  m.castShadow=cast; m.receiveShadow=recv;
  return m;
}

function normalizeSlideUrl(rawUrl) {
  if (!rawUrl) return "";
  let url = rawUrl.trim();
  if (url.includes("<iframe")) {
    const m = url.match(/src=["']([^"']+)["']/);
    if (m) url = m[1];
  }
  if (url.includes("docs.google.com/presentation")) {
    url = url.replace(/\/pubembed\b/, "/embed");
  }
  return url;
}

// If embed URL provided, use iframe
function setScreenSlide(url) {
  const normalized = normalizeSlideUrl(url);
  if (normalized) {
    slideDiv.innerHTML = `<iframe src="${normalized}" style="width:100%;height:100%;border:none;display:block;" allowfullscreen loading="eager" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
  }
}

const studentMeshes = {}, labelObjs = {}, bubbleEls = {};
let bubbleTimers = {};

function createStudentLabel(a){
  const wrap = document.createElement('div');
  wrap.className = 'stu-label-wrap';
  wrap.id = 'slw-'+a.id;

  const bub = document.createElement('div');
  bub.className = 'stu-bubble hidden';
  bub.id = 'sbub-'+a.id;

  const emo = document.createElement('div');
  emo.className = 'stu-emo';
  emo.id = 'semo-'+a.id;
  emo.textContent = EMO[a.emotion]||'😐';

  const ntag = document.createElement('div');
  ntag.className = 'stu-name-tag';
  ntag.id = 'sname-'+a.id;
  ntag.textContent = a.name;

  wrap.appendChild(bub);
  wrap.appendChild(emo);
  wrap.appendChild(ntag);
  bubbleEls[a.id] = { wrap, bub, emo, ntag };

  const obj = new CSS2DObject(wrap);
  obj.position.set(0, 0.95, 0); // above head
  return obj;
}

function placeStudents(){
  agents.forEach((a, i) => {
    const s = SEATS[i];
    if (!s) return;
    const mesh = buildStudentChar(a.id);
    mesh.position.set(s.x, 0, s.z);
    mesh.rotation.y = Math.PI + (s.ry || 0);
    mesh.castShadow = true;
    scene.add(mesh);
    studentMeshes[a.id] = mesh;

    const lbl = createStudentLabel(a);
    mesh.add(lbl);
    labelObjs[a.id] = lbl;
  });
}

function updateStudents(updated){
  if(!updated) return;
  updated.forEach(u => {
    const a = agents.find(x=>x.id===u.id);
    if(!a) return;
    Object.assign(a, u);
    const els = bubbleEls[u.id];
    if(!els) return;

    // Emotion
    els.emo.textContent = EMO[u.emotion]||'😐';

    // Absent
    const mesh = studentMeshes[u.id];
    if(mesh){
      mesh.traverse(c=>{
        if(c.isMesh){ c.material.transparent=!u.present; c.material.opacity=u.present?1:0.12; }
      });
    }
    if(!u.present){
      els.ntag.innerHTML = u.name+'<br/><span style="font-size:9px;color:#ef4444;">Left class</span>';
    } else {
      els.ntag.textContent = u.name;
    }

    // Speech bubble
    if(u.speech){
      els.bub.textContent = u.speech;
      els.bub.classList.remove('hidden');
      clearTimeout(bubbleTimers[u.id]);
      bubbleTimers[u.id] = setTimeout(()=>{
        els.bub.textContent=''; els.bub.classList.add('hidden');
      }, 5000);
      // Subtle bounce
      if(mesh){ mesh.position.y=0.05; setTimeout(()=>{if(mesh)mesh.position.y=0;},400); }
    }
  });
  updateParticipants();
  updateStats();
}

// ── Animate loop ──────────────────────────────────────────────────────────
let tick = 0;
function animate(){
  requestAnimationFrame(animate);
  tick += 0.016;
  // Idle breathing
  agents.forEach((a,i)=>{
    const m=studentMeshes[a.id];
    if(m&&a.present) m.position.y=Math.sin(tick*0.9+i*1.1)*0.003;
  });
  // Instructor slight sway
  instrGrp.rotation.y = -0.7 + Math.sin(tick*0.4)*0.03;
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
animate();

// ── Speech ────────────────────────────────────────────────────────────────
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ return; }
  recognition=new SR();
  recognition.continuous=true; recognition.interimResults=true; recognition.lang='en-US';
  let fin='';
  recognition.onresult=e=>{
    fin=''; let interim='';
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    const t=(fin+interim).trim();
    if(t) document.getElementById('teachInput').value=t;
  };
  recognition.onerror=()=>stopMic();
  recognition.onend=()=>{ if(isListening) try{recognition.start();}catch{} };
  recognition._get=()=>fin.trim();
}

const btnMic  = document.getElementById('btnMic');
const tbMicBtn= document.getElementById('tbMicBtn');
btnMic.addEventListener('mousedown',startMic);
btnMic.addEventListener('touchstart',startMic,{passive:true});
btnMic.addEventListener('mouseup',stopMic);
btnMic.addEventListener('touchend',stopMic);
btnMic.addEventListener('mouseleave',stopMic);
tbMicBtn.addEventListener('click',()=>{ if(isListening)stopMic(); else startMic(); });

function startMic(){
  if(sessionEnded||!recognition)return;
  isListening=true;
  btnMic.classList.add('listening');
  tbMicBtn.classList.add('active');
  document.getElementById('micRecDot').classList.remove('hidden');
  document.getElementById('teachInput').value='';
  try{recognition.start();}catch{}
}
function stopMic(){
  if(!isListening)return;
  isListening=false;
  btnMic.classList.remove('listening');
  document.getElementById('micRecDot').classList.add('hidden');
  try{recognition.stop();}catch{}
  setTimeout(()=>{
    const t=(recognition._get&&recognition._get())||document.getElementById('teachInput').value.trim();
    if(t){ document.getElementById('teachInput').value=t; sendMsg(); }
  },400);
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById('teachInput');
  const text=inp.value.trim();
  if(!text||sessionEnded)return;
  inp.value='';
  document.getElementById('btnSend').disabled=true;
  addChat('you','You',text);
  exchangeCount++;
  setScreenText(config.subject, text.length>60?text.substring(0,57)+'…':text);

  try{
    const res=await fetch('/api/speak',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,elapsed})
    });
    const d=await res.json();
    if(d.error) throw new Error(d.error);
    if(d.classroom_mood){
      document.getElementById('tbMood').textContent = moodEmoji(d.classroom_mood)+' '+cap(d.classroom_mood)+' Atmosphere';
    }
    if(d.agents) updateStudents(d.agents);
    (d.responses||[]).forEach(r=>{ if(r.speech){ addChat(r.id, cap(r.id), r.speech); exchangeCount++; } });
    if(d.situation_note) addSitNote(d.situation_note);
    const ev=d.instructor_evaluation;
    if(ev&&ev.score){ scores.push(ev.score); showScoreFlash(ev.score,ev.note); }
    updateStats();
  }catch(e){ addChat('system','System','Error: '+e.message); console.error(e); }
  document.getElementById('btnSend').disabled=false;
  inp.focus();
}

// ── Chat helpers ──────────────────────────────────────────────────────────
function addChat(id, name, text){
  const feed=document.getElementById('chatFeed');
  const empty=feed.querySelector('div[style]');
  if(empty)empty.remove();
  const msg=document.createElement('div');
  msg.className='chat-msg';
  const col=id==='you'?'#3b82f6':(AGENT_COLORS[id]||'#94a3b8');
  const isYou=id==='you';
  const now=new Date();
  const timeStr=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' '+String(now.getSeconds()).padStart(2,'0')+'s';
  msg.innerHTML=`
    <div class="cm-avatar" style="background:${col}22;">${isYou?'👨‍🏫':(AGENT_EMOJI[id]||'🧑')}</div>
    <div class="cm-body">
      <div class="cm-who ${isYou?'you':id}" style="color:${col}">${name}${isYou?' (You)':''}<span class="cm-time" style="margin-left:6px;">${timeStr}</span></div>
      <div class="${isYou?'cm-bubble-you':'cm-bubble-stu'}">${esc(text)}</div>
    </div>`;
  feed.appendChild(msg);
  feed.scrollTop=feed.scrollHeight;
}

function addSitNote(note){
  const feed=document.getElementById('chatFeed');
  const div=document.createElement('div');
  div.className='sit-note-chat';
  div.textContent='⚠ '+note;
  feed.appendChild(div);
  feed.scrollTop=feed.scrollHeight;
}

function showScoreFlash(score,note){
  const old=document.querySelector('.score-flash');
  if(old)old.remove();
  const div=document.createElement('div');
  div.className='score-flash';
  const c=score>=7?'#22c55e':score>=5?'#f59e0b':'#ef4444';
  div.style.color=c; div.style.borderColor=c;
  div.textContent=score+'/10  '+( note?'— '+note:'');
  document.body.appendChild(div);
  setTimeout(()=>{div.style.opacity='0';div.style.transition='opacity .6s';setTimeout(()=>div.remove(),600);},3500);
}

function updateStats(){
  const p=agents.filter(a=>a.present).length;
  document.getElementById('wsPresent').textContent=p;
  document.getElementById('wsExchanges').textContent=exchangeCount;
  const av=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const el=document.getElementById('wsAvg');
  el.textContent=scores.length?av:'–';
  el.style.color=av>=7?'#22c55e':av>=5?'#f59e0b':'#ef4444';
}

function moodEmoji(m){ return {engaged:'🤩',energetic:'⚡',calm:'😊',tense:'😬',confused:'😕',chaotic:'😱',lukewarm:'😐'}[m]||'😊'; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Timer ─────────────────────────────────────────────────────────────────
function startTimer(){
  timerH=setInterval(()=>{
    elapsed++;
    const m=Math.floor(elapsed/60),s=elapsed%60;
    document.getElementById('tbTimer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if(elapsed>=maxSecs&&!sessionEnded)endSession();
  },1000);
}

// ── End session ───────────────────────────────────────────────────────────
async function endSession(){
  if(sessionEnded)return;
  sessionEnded=true;
  clearInterval(timerH);
  const btn=document.getElementById('btnEnd');
  btn.textContent='Generating…'; btn.disabled=true;
  try{
    const res=await fetch('/api/final-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({elapsed})});
    const d=await res.json();
    if(d.overall_score!==undefined) window.location.href='/report';
    else throw new Error(d.error||'Failed');
  }catch(e){ btn.textContent='Error – retry'; btn.disabled=false; sessionEnded=false; console.error(e); }
}

// ── Slides panel ──────────────────────────────────────────────────────────
// ====================== SLIDES =========================

let slides = [];
slideIndex = 0;
totalSlides = 0;

const slideList = document.getElementById("spSlidesList");
const slideCounter = document.getElementById("spSlideNumNav");
const noSlide = document.getElementById("spNoSlide");

// Load PDF/PPT (for now image/pdf preview)
document.getElementById("slideFileInput").addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    slides = [];
    slideIndex = 0;

    noSlide.style.display = "none";
    slideList.innerHTML = "";

    const url = URL.createObjectURL(file);

    slides.push(url);

    const thumb = document.createElement("div");
    thumb.className = "slide-thumb active";
    thumb.innerHTML = `
        <iframe
            src="${url}"
            style="width:100%;height:100%;border:none;pointer-events:none;">
        </iframe>
    `;

    thumb.onclick = () => {
        showSlide(0);
    };

    slideList.appendChild(thumb);

    showSlide(0);
});

function showSlide(index){

    if(index<0 || index>=slides.length) return;

    slideIndex = index;

    slideCounter.innerHTML =
        (slideIndex+1)+" / "+slides.length;

    document.querySelectorAll(".slide-thumb")
    .forEach((thumb,i)=>{
        thumb.classList.toggle("active",i===slideIndex);
    });

    slideDiv.innerHTML = `
        <iframe
            src="${slides[slideIndex]}"
            style="width:100%;height:100%;border:none;"
            allowfullscreen>
        </iframe>
    `;
}

document.getElementById("btnPrev").onclick = ()=>{

    if(slideIndex>0){
        showSlide(slideIndex-1);
    }

};

document.getElementById("btnNext").onclick = ()=>{

    if(slideIndex<slides.length-1){
        showSlide(slideIndex+1);
    }

};
// ── Boot ──────────────────────────────────────────────────────────────────
async function boot(){
  config=JSON.parse(sessionStorage.getItem('sessionConfig')||'{}');
  if(!config.subject){ window.location.href='/'; return; }
  maxSecs=parseInt(config.duration||30)*60;
  document.getElementById('tbSubject').textContent=config.subject;

  const res=await fetch('/api/session-state');
  const d=await res.json();
  agents=d.agents||[];

  placeStudents();
  updateParticipants();
  setScreenText(config.subject,'Class is starting…');

  // If slide URL provided — show on projector screen
  if(config.slideEmbedUrl||config.slideUrl){
    const u=config.slideEmbedUrl||config.slideUrl;
    setScreenSlide(u);
    document.getElementById('spNoSlide').textContent='🔗 Slides loaded from link';
  }

  initWebcam();
  initSpeech();
  startTimer();

  document.getElementById('btnSend').addEventListener('click',sendMsg);
  document.getElementById('btnEnd').addEventListener('click',endSession);
  document.getElementById('teachInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
  });
}

boot();
</script>
